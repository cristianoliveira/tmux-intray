  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install dependencies
        uses: ./.github/actions/setup-environment
        with:
          os: ${{ runner.os }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.8.0

      - name: Run lint
        run: make lint-strict

      - name: Run dependency guardrails
        run: make check-import-deny-rules

      - name: Run security check
        run: make security-check

      - name: Check formatting
        run: make check-fmt

  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install dependencies
        uses: ./.github/actions/setup-environment
        with:
          os: ${{ runner.os }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run coverage
        run: make go-cover

      # Enforce coverage budget (threshold=65, override via THRESHOLD env)
      - name: Check coverage threshold
        run: make check-coverage THRESHOLD=65

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.out

      - name: tmux-intray-coverage
        uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          flags: unittests
          use_oidc: true
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}  # optional for public repositories

  install:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install dependencies
        uses: ./.github/actions/setup-environment
        with:
          os: ${{ runner.os }}
          install-go: true
          install-node: true

      - name: Update npm
        shell: bash
        run: npm install -g npm



      - name: Test npm installation
        run: make install-npm

      - name: Test Go binary build
        run: make install-go

      - name: Test source installation
        run: make install

  install-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install dependencies
        uses: ./.github/actions/setup-environment
        with:
          os: ${{ runner.os }}
          install-go: true
          install-node: true

      - name: Test npm installation
        run: make install-npm

      - name: Test Go binary build
        run: make install-go

      - name: Test Docker installation
        run: make install-docker

      - name: Test source installation
        run: make install

  # Validate npm package structure and build all platform binaries
  npm-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build all platform binaries
        run: ./scripts/build-npm-binaries.sh

      - name: Validate npm package
        run: |
          echo "Checking package.json files field..."
          node -e "
            const pkg = require('./package.json');
            const fs = require('fs');
            const files = pkg.files || [];
            for (const f of files) {
              if (f === 'dist') {
                if (!fs.existsSync('dist')) {
                  console.error('Missing: dist/');
                  process.exit(1);
                }
                const binaries = fs.readdirSync('dist').filter(f => f.startsWith('tmux-intray_'));
                if (binaries.length === 0) {
                  console.error('No binaries found in dist/');
                  process.exit(1);
                }
                console.log('Found ' + binaries.length + ' binaries in dist/');
              } else if (!fs.existsSync(f)) {
                console.error('Missing: ' + f);
                process.exit(1);
              }
            }
            console.log('All package files validated');
          "

      - name: Test npm pack (dry run)
        run: npm pack --dry-run

      - name: Verify wrapper script
        run: |
          # Test that the wrapper script can find the binary
          node -e "
            const path = require('path');
            const fs = require('fs');
            const binaryName = 'tmux-intray_linux_amd64';
            const binaryPath = path.join(__dirname, 'dist', binaryName);
            if (!fs.existsSync(binaryPath)) {
              console.error('Binary not found: ' + binaryPath);
              process.exit(1);
            }
            console.log('Wrapper can find binary: ' + binaryPath);
          "
